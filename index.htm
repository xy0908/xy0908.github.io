<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="关键词信息">
    <meta name="description" content="描述信息">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞机大战</title>


    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/index.css">
</head>

<body>
    <!-- 外部大盒子 -->
    <div class="warp ab">

        <!-- 游戏界面 -->
        <div class="map ab">

            <!-- <div class="plane"></div>    我军飞机 -->
            <!-- <div class="enemy"></div>   敌军飞机 -->

            <div class="allbiu"></div> <!-- 我军子弹容器 -->

        </div>

        <!-- 游戏标题 -->
        <h1 class="title ab">飞机大战</h1>

        <!-- 难度选择 -->
        <div class="difficulty ab">
            <ul>
                <li>简单</li>
                <li>中等</li>
                <li>困难</li>
                <li>地狱</li>
            </ul>
        </div>

        <!-- 分数 -->
        <div class="fraction ab"></div>

        <!-- 评价 -->
        <div class="evaluate ab">
            <ul>
                <li>
                    <span>最终得分:</span><span class="result">&nbsp;10</span>
                </li>
                <li>
                    <span>获得评价:</span><span class="praise">&nbsp;太菜了</span>
                </li>
                <li>
                    <p>重新开始</p>
                </li>
            </ul>
        </div>
    </div>

    <script>
        // 获取元素
        let oWarp = document.querySelector(".warp"),
            oMap = document.querySelector(".map"), //游戏界面
            oTitle = document.querySelector(".title"),//游戏标题
            oDifficultyBox = document.querySelector(".difficulty"),//难度选择
            oFraction = document.querySelector(".fraction"), //分数
            oAllBiu = document.querySelector(".allbiu"), //我军子弹容器
            oEvaluate = document.querySelector(".evaluate"),   //结算界面
            oResult = oEvaluate.querySelector(".result"),     //分数
            oPraise = oEvaluate.querySelector(".praise"),   //评价
            oGo = oEvaluate.getElementsByTagName("p")[0];   //重新开始游戏
        exe();
        //初始化页面
        function exe() {
            let oLi = document.querySelectorAll(".difficulty ul li"),  //难度选择
                oLilen = oLi.length;

            // 循环oLi 
            for (let i = 0; i < oLilen; i++) {
                oLi[i].onclick = function (e) {
                    startGame(i, {
                        x: e.clientX - oWarp.offsetLeft,
                        y: e.clientY - oWarp.offsetTop
                    })  //执行开始游戏函数  
                }
            }
        }

        // 开始游戏
        function startGame(level, pos) {
            clearBox(level, pos)           //执行隐藏和显示函数

            moverBackground(level, pos)    //执行移动和切换背景图片函数

            let myPlane = createMePlane(level, pos)      //执行创建我军飞机函数

            createEnemy(level, myPlane)                        //执行创建敌军飞机函数

            oWarp.oF = 0;   // 初始分数 = 0
        }

        //重新开始游戏
        oGo.onclick = function () {
            cancelAnimationFrame(oWarp.moverPos);  //页面停止滚动
            oEvaluate.style.display = "none"   //结算页面隐藏
            oDifficultyBox.style.display = "block";   // 显示难度选择
            oTitle.style.display = "block";       //显示标题

        }

        //隐藏和显示
        function clearBox(level, pos) {
            oTitle.style.display = "none";       //隐藏标题
            oFraction.style.display = "block";     // 显示分数
            oDifficultyBox.style.display = "none";   // 隐藏难度选择
        }

        //移动换切换背景图片
        function moverBackground(level, pos) {
            let num = 0;
            oMap.style.backgroundImage = `url(./images/bg_${level + 1}.jpg)`; //切换背景图

            (function mover() {  //移动背景图片
                num++;
                oMap.style.backgroundPositionY = num + "px";
                oWarp.moverPos = requestAnimationFrame(mover)
            })()
        }

        //创建我军的飞机
        function createMePlane(level, pos) {
            //创建飞机
            let oImg = new Image();
            oImg.src = "./images/plane_1.png";
            oImg.width = 50;
            oImg.height = 38;
            oImg.className = "plane"

            //设置飞机在页面的初始位置
            oImg.style.left = pos.x - oImg.width / 2 + "px";
            oImg.style.top = pos.y - oImg.height / 2 + "px";

            //把飞机添加到页面中
            oMap.appendChild(oImg)


            //限制飞机的飞行范围
            let leftMin = -oImg.width / 2,                    //左边最小飞行范围 = 飞机自身的一半
                leftMax = oMap.clientWidth - oImg.width / 2,  //右边最大飞行范围 = 游戏界面的宽 - 飞机自身宽度的一半
                topMin = 0,                                   //上面最小飞行范围 = 0
                topMax = oMap.clientHeight - oImg.height / 2; //下面最大飞行范围 = 游戏页面的高 - 飞机自身高度的一半

            //让飞机跟着鼠标移动
            document.onmousemove = function (e) {
                let left = e.clientX - oWarp.offsetLeft - oImg.width / 2,
                    top = e.clientY - oWarp.offsetTop - oImg.height / 2;

                //判断
                left < leftMin ? left = leftMin : left = left;  //限制不能超过左边
                left > leftMax ? left = leftMax : left = left;  //限制不能超过右边
                top < topMin ? top = topMin : top = top;        //限制不能超过上边
                top > topMax ? top = topMax : top = top;        //限制不能超过下边

                oImg.style.left = left + "px";
                oImg.style.top = top + "px";
            }

            //执行子弹函数
            createBiu(level, pos, oImg)

            return oImg;  // 把我方飞机返回出去
        }

        //生成飞机的子弹
        function createBiu(level, pos, oImg) {
            //定时生成子弹
            oWarp.biu = setInterval(() => {
                // 以分数判断 是否添加子弹
                if (oFraction.innerHTML > 500) {       //当分数大于 500 子弹为三列   
                    biu(true, -1);
                    biu(true, 0);
                    biu(true, 1);
                } else if (oFraction.innerHTML > 300) {  // 当分数大于300 子弹为俩列
                    biu(true, -1);
                    biu(true, 1);
                } else {                      // 否则 为1列
                    biu()
                }
            }, [300, 200, 150, 100][level])

            //生成子弹函数
            function biu(bool, n) {
                let img = new Image();
                img.src = "./images/fire.png"
                img.width = 30;
                img.height = 30;
                img.className = "fire";

                //设置子弹的初始位置
                let left = oImg.offsetLeft + oImg.width / 2 - img.width / 2,
                    top = oImg.offsetTop;

                //
                if (bool) {
                    left = left + img.width * n
                }

                img.style.left = left + "px";
                img.style.top = top + "px";


                //把子弹添加到页面中
                oAllBiu.appendChild(img)

                //移动子弹
                function mover() {
                    //判断子弹是否存在页面中
                    if (img.parentNode) {
                        top -= 10;

                        if (top < -img.height) {
                            oAllBiu.removeChild(img)   //移除img节点
                        } else {
                            img.style.top = top + "px";   //移动子弹
                            requestAnimationFrame(mover)
                        }
                    }
                }

                //调用移除mover方法
                setTimeout(() => {
                    requestAnimationFrame(mover)
                }, 20)

            }
        }

        let enemyNum = 1;
        //创建敌军飞机
        function createEnemy(level, myPlane) {
            let speed = [5, 6, 7, 8][level],
                mapW = oMap.clientWidth,
                mapH = oMap.clientHeight;

            //定时生成敌军飞机
            oWarp.enemy = setInterval(() => {
                let oEnemy = new Image();
                // 1-29 模 30 = 1 代表小飞机   30 模 30 = 0 代表大飞机
                oEnemy.index = (enemyNum % 30) ? 1 : 0;
                oEnemy.src = `./images/enemy_${["big", "small"][oEnemy.index]}.png`
                oEnemy.width = [100, 50][oEnemy.index];
                oEnemy.height = [76, 43][oEnemy.index];
                oEnemy.className = "enemy";
                oEnemy.HP = [5, 1][oEnemy.index]    // 设置敌军飞机血量   5为大飞机血量  1为小飞机

                // 设置飞机的初始位置
                let top = -oEnemy.height
                oEnemy.style.top = top + "px";
                oEnemy.style.left = Math.random() * mapW - oEnemy.width / 2 + "px";

                //把飞机添加到页面中
                oMap.appendChild(oEnemy)
                enemyNum++;

                //移动敌军飞机
                function mover() {
                    //判断是否存在页面中
                    if (oEnemy.parentNode) {
                        top += speed;

                        if (top > mapH) {
                            oMap.removeChild(oEnemy)   //移除img节点
                        } else {
                            oEnemy.style.top = top + "px";   //移动敌军飞机
                            let arrAllBiu = oAllBiu.children;
                            //遍历当前子弹节点
                            for (let i = arrAllBiu.length - 1; i >= 0; i--) {
                                // 碰撞了 移除
                                if (isCollsion(arrAllBiu[i], oEnemy)) {
                                    oAllBiu.removeChild(arrAllBiu[i])  //把子弹节点移除

                                    oEnemy.HP--      // 每次子弹打中敌军飞机一次 飞机血量-1

                                    if (oEnemy.HP == 0) { //如果敌军飞机血量 == 0
                                        oWarp.oF += [50, 10][oEnemy.index];
                                        oFraction.innerHTML = oWarp.oF;

                                        //调用敌军飞机爆炸的函数
                                        // 传入敌军飞机 宽度 高度 x坐标 y坐标 和下标 的参数
                                        boom({
                                            w: oEnemy.width,
                                            h: oEnemy.height,
                                            x: oEnemy.offsetLeft,
                                            y: oEnemy.offsetTop,
                                            i: oEnemy.index
                                        })

                                        oMap.removeChild(oEnemy)  //移除飞机

                                    }
                                }
                            }

                            // 检测 敌军飞机 是否和 我军飞机 发生碰撞
                            if (myPlane.parentNode && isCollsion(oEnemy, myPlane)) {

                                // 当我军飞机和敌军飞机碰撞后 加载爆炸动画
                                boom({
                                    w: oEnemy.width,
                                    h: oEnemy.height,
                                    x: oEnemy.offsetLeft,
                                    y: oEnemy.offsetTop,
                                    i: oEnemy.index
                                })

                                //在我军飞机的位置上 重新生成一张我军飞机的图片
                                boom({
                                    w: myPlane.width,
                                    h: myPlane.height,
                                    x: myPlane.offsetLeft,
                                    y: myPlane.offsetTop,
                                    i: 2
                                })
                                oMap.removeChild(oEnemy);  //移除敌军
                                oMap.removeChild(myPlane); //移除我军

                                //游戏结束
                                over();

                                return;
                            }
                            requestAnimationFrame(mover)
                        }
                    }
                }
                //调用一次mover方法
                setTimeout(() => {
                    requestAnimationFrame(mover)
                }, 20);

            }, [300, 200, 150, 100][level]);
        }

        //我军子弹是否与敌军飞机碰撞的函数
        function isCollsion(obj1, obj2) {
            // obj1 = 我军子弹    obj2 = 敌军飞机

            // 我军子弹的位置
            let T1 = obj1.offsetLeft,
                B1 = T1 + obj1.clientHeight,
                L1 = obj1.offsetTop,
                R1 = L1 + obj1.clientWidth;

            // 敌军飞机的位置
            let T2 = obj2.offsetLeft,
                B2 = T2 + obj2.clientHeight,
                L2 = obj2.offsetTop,
                R2 = L2 + obj2.clientWidth;

            //没有碰撞的情况  
            // 我军子弹右边 < 敌军飞机左边 = 没有碰撞    
            // 敌军飞机右边 < 我军子弹左边 = 没有碰撞    
            // 我军子弹下面 < 敌军飞机上面 = 没有碰撞
            // 敌军飞机下面 < 我军子弹上面 = 没有碰撞 
            return !(R1 < L2 || R2 < L1 || B1 < T2 || B2 < T1);  //取反

        }

        //敌军飞机爆炸函数
        function boom(obj) {  //接受参数
            //设置爆炸图片节点 宽度 高度 出现的位置 并添加到map游戏界面中
            let img = new Image();
            img.src = `./images/${["boom_small", "boom_big", "plane_1"][obj.i]}.png`;
            img.className = "boom" + ["2", "", "2"][obj.i];
            img.width = obj.w;
            img.height = obj.h;
            img.style.left = obj.x + "px";
            img.style.top = obj.y + "px";
            oMap.appendChild(img);

            // 每1秒 检测一次imh图片是否存在父节点 存在就把img移除
            setInterval(() => {
                img.parentNode && oMap.removeChild(img)
            }, 1000)
        }

        //游戏结束
        function over() {
            document.onmousemove = null  //清除鼠标移动事件
            clearInterval(oWarp.biu);    // 停止子弹生成
            clearInterval(oWarp.enemy);  //停止敌军飞机生成

            end();
        }

        //结算游戏
        function end() {
            oResult.innerHTML = oWarp.oF;  //把分数添加到结算页面

            if (oWarp.oF <= 500) {
                oPraise.innerHTML = " 太菜了,建议去摩尔庄园种菜"
            } else if (oWarp.oF >= 500 && oWarp.oF <= 1000) {
                oPraise.innerHTML = " 还行"
            } else {
                oPraise.innerHTML = " 真棒"
            }
            oFraction.style.display = "none";   //分数隐藏
            oEvaluate.style.display = "block"   //结算页面显示
        }
    </script>
</body>

</html>
